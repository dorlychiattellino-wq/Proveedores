<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gestión de Proveedores</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Proveedores">
<meta name="theme-color" content="#0a0d1a">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0d1a;
    --bg2: #12162a;
    --bg3: #1a1d35;
    --border: #2d3154;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --dim: #64748b;
    --accent: #6366f1;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #f87171;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--bg2), var(--bg3)); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
  .header-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .header-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 4px; }
  .stats { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-chip { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 6px 14px; text-align: center; }
  .stat-chip .num { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .stat-chip .lbl { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--dim); letter-spacing: 1px; }

  /* TABS */
  .tabs { display: flex; gap: 2px; padding: 0 20px; border-bottom: 1px solid var(--border); background: #12162a; overflow-x: auto; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); padding: 12px 16px; cursor: pointer; font-weight: 600; font-size: 13px; font-family: 'Nunito', sans-serif; white-space: nowrap; transition: all 0.15s; }
  .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

  /* CONTENT */
  .content { padding: 20px; max-width: 900px; margin: 0 auto; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 14px; }
  .card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; }
  .card-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
  .card-meta { color: var(--dim); font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-top: 4px; }

  /* MONTOS */
  .montos { display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
  .monto-chip .ml { color: var(--dim); font-size: 10px; font-family: monospace; letter-spacing: 0.5px; }
  .monto-chip .mv { font-weight: 700; font-size: 14px; font-family: 'IBM Plex Mono', monospace; }

  /* BADGES */
  .badge { padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; font-family: monospace; display: inline-block; margin-left: 4px; }
  .b-pendiente { background: #fef3c7; color: #92400e; }
  .b-pagado { background: #d1fae5; color: #065f46; }
  .b-parcial { background: #dbeafe; color: #1e40af; }
  .b-facturado { background: #ede9fe; color: #5b21b6; }
  .b-sin_factura { background: #fce7f3; color: #9d174d; }
  .b-diferencia { background: #fee2e2; color: #991b1b; }
  .b-vigente { background: #d1fae5; color: #065f46; }

  /* BUTTONS */
  .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; color: #fff; font-family: 'Nunito', sans-serif; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.88; }
  .btn-accent { background: var(--accent); }
  .btn-dark { background: var(--bg3); color: var(--muted); }
  .btn-green { background: #15803d; }
  .btn-sm { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text); font-family: 'Nunito', sans-serif; }
  .btn-delete { background: #3f1010; color: var(--red); }
  .btn-edit { background: #1e2235; }
  .btn-factura { background: #2d1f6e; }
  .btn-pago { background: #14532d; }
  .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

  /* SECTION HEADER */
  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }

  /* FILTERS */
  .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

  /* INPUTS */
  input, select, textarea {
    width: 100%; background: #0f1117; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 12px; font-size: 14px; outline: none;
    font-family: 'Nunito', sans-serif; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }
  select { cursor: pointer; }
  label.field-label { display: block; color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; font-family: 'IBM Plex Mono', monospace; }
  .field { margin-bottom: 14px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(10,10,20,0.75); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--dim); font-size: 24px; cursor: pointer; line-height: 1; }
  .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 16px; }

  /* ITEMS TABLE */
  .item-row { display: grid; grid-template-columns: 1fr 70px 120px 32px; gap: 8px; margin-bottom: 8px; align-items: end; }
  .add-item-btn { background: none; border: 1px dashed var(--border); color: var(--accent); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; width: 100%; margin-bottom: 14px; font-family: 'Nunito', sans-serif; }
  .item-remove { background: #3f1010; border: none; border-radius: 6px; color: var(--red); cursor: pointer; height: 38px; font-size: 16px; width: 100%; }

  /* TOTAL BOX */
  .total-box { background: #0f1117; border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
  .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .total-final { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; color: var(--text); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 4px; }
  .total-final span:last-child { color: var(--accent); }

  /* ALERT */
  .alert-diff { background: #3f1010; border: 1px solid var(--red); border-radius: 10px; padding: 12px; margin-bottom: 12px; color: var(--red); font-weight: 700; }
  .alert-info { background: #0f1117; border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 20px; }

  /* PROGRESS BAR */
  .progress-wrap { background: #0f1117; border-radius: 8px; height: 8px; overflow: hidden; margin-top: 14px; }
  .progress-bar { height: 100%; border-radius: 8px; transition: width 0.5s; }
  .progress-pct { color: var(--dim); font-size: 11px; font-family: 'IBM Plex Mono', monospace; text-align: right; margin-top: 4px; }

  /* ITEMS DETAIL */
  .items-detail { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .item-detail-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 2px; }

  /* CTA DETAIL */
  .cta-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1e2235; flex-wrap: wrap; gap: 6px; }
  .pagos-list { background: #0f1117; border-radius: 8px; padding: 12px; margin-top: 12px; }
  .pago-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }

  /* PAGO CARD */
  .pago-card { border-left: 3px solid var(--green); }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { color: #475569; font-size: 14px; }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--accent); font-size: 18px; }

  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; color: var(--text); font-weight: 600; z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.4); animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  @media (max-width: 500px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .item-row { grid-template-columns: 1fr 60px 100px 30px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="loading">⏳ Cargando datos...</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAjZ2kHa3XvJgVhPGTDerUEexcFO6kpDaI",
  authDomain: "proveedores-empresa.firebaseapp.com",
  databaseURL: "https://proveedores-empresa-default-rtdb.firebaseio.com",
  projectId: "proveedores-empresa",
  storageBucket: "proveedores-empresa.firebasestorage.app",
  messagingSenderId: "1074116103684",
  appId: "1:1074116103684:web:a37370cf08ca39b98e6f51"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getDatabase(firebaseApp);

// ─── STATE ────────────────────────────────────────────────────────────────
let state = {
  tab: 'presupuestos',
  presupuestos: {},
  facturas: {},
  pagos: {},
  modal: null,
  editData: null,
  filtroProveedor: '',
  filtroEstado: 'todos',
  filtroCtaProveedor: '',
  alertasAbiertas: false,
  tcBna: null,
};

// ─── FIREBASE LISTENERS ──────────────────────────────────────────────────
onValue(ref(db, 'presupuestos'), snap => { state.presupuestos = snap.val() || {}; render(); });
onValue(ref(db, 'facturas'), snap => { state.facturas = snap.val() || {}; render(); });
onValue(ref(db, 'pagos'), snap => { state.pagos = snap.val() || {}; render(); });

// TC BNA — se busca en segundo plano, no bloquea la carga
async function fetchTcBna() {
  const apis = [
    async () => {
      const r = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
      const d = await r.json();
      // Usar dolar oficial aproximado desde otra fuente
      return null; // fallback
    },
    async () => {
      const r = await fetch('https://dolarapi.com/v1/dolares/oficial');
      const d = await r.json();
      return parseFloat(d?.venta) || null;
    },
    async () => {
      const r = await fetch('https://api.bluelytics.com.ar/v2/latest');
      const d = await r.json();
      return parseFloat(d?.oficial?.value_sell) || null;
    }
  ];
  for(const api of apis) {
    try {
      const tc = await api();
      if(tc) { state.tcBna = tc; render(); return; }
    } catch(e) {}
  }
  state.tcBna = null;
}
fetchTcBna();

// Permitir ingresar TC manualmente desde el header
window.actualizarTc = function(val) {
  const tc = parseFloat(val);
  if(tc > 0) {
    state.tcBna = tc;
    // Re-render solo si no estamos en un modal abierto (evita perder datos)
    if(!state.modal) render();
  }
};

// ─── HELPERS ─────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const hoy = () => new Date().toISOString().slice(0,10);

function fmt(n, moneda) {
  const num = parseFloat(n) || 0;
  return new Intl.NumberFormat('es-AR', {
    style: 'currency',
    currency: moneda === 'USD' ? 'USD' : 'ARS',
    minimumFractionDigits: 2
  }).format(num);
}

function fmtDual(usd, tc) {
  if(!tc || usd == null) return fmt(usd,'USD');
  const pesos = usd * tc;
  return fmt(usd,'USD') + ' <span style="color:var(--dim);font-size:11px;font-family:monospace">(' + fmt(pesos,'ARS') + ')</span>';
}

function getPagosDePresupuesto(pptoId) {
  return Object.values(state.pagos).filter(p => p.presupuestoId === pptoId).reduce((s,p) => s + (parseFloat(p.monto)||0), 0);
}
function getFacturasDePresupuesto(pptoId) {
  return Object.values(state.facturas).filter(f => f.presupuestoId === pptoId);
}
function getPagosDeFactura(factId) {
  return Object.values(state.pagos).filter(p => p.facturaId === factId).reduce((s,p) => s + (parseFloat(p.monto)||0), 0);
}
function estadoPago(pptoId) {
  const p = state.presupuestos[pptoId]; if(!p) return 'pendiente';
  // Si fue marcado como cerrado manualmente
  if(p.cerrado) return 'pagado';
  const total = parseFloat(p.totalConIva)||0;
  const ab = getPagosDePresupuesto(pptoId);
  if(ab >= total - 1) return 'pagado';
  if(ab > 0) return 'parcial';
  return 'pendiente';
}

// Obtener TC del último pago de un presupuesto (para saldo en pesos al cerrar)
function getTcUltimoPago(pptoId) {
  const pagos = Object.values(state.pagos)
    .filter(pg => pg.presupuestoId === pptoId && pg.tcPago)
    .sort((a,b) => (b.fechaPago||'').localeCompare(a.fechaPago||''));
  return pagos[0]?.tcPago || null;
}

// Calcular saldo en pesos según estado.
// CERRADO: NC = (suma facturas USD × TC factura) − (suma pagos USD × TC pago real). Refleja la pérdida cambiaria real.
// ABIERTO: simple conversión al TC del día.
function saldoEnPesos(p) {
  if(p.moneda !== 'USD') return null;
  const saldoUSD = (parseFloat(p.totalConIva)||0) - getPagosDePresupuesto(p.id);
  if(saldoUSD <= 0) return 0;

  if(p.cerrado) {
    // Cálculo de NC en pesos: lo facturado al TC factura − lo pagado al TC del pago
    const facturas = Object.values(state.facturas).filter(f => f.presupuestoId === p.id);
    const pagos = Object.values(state.pagos).filter(pg => pg.presupuestoId === p.id);

    // Pesos facturados: cada factura × su TC. Si no tiene TC, usar TC cierre como fallback.
    const tcFallback = p.tcCierre || state.tcBna || 0;
    const pesosFacturado = facturas.reduce((s,f) => {
      const tc = parseFloat(f.tcFactura) || tcFallback;
      return s + (parseFloat(f.montoFacturado)||0) * tc;
    }, 0);

    // Pesos pagados: cada pago × su TC pago. Si no tiene TC, usar fallback.
    const pesosPagado = pagos.reduce((s,pg) => {
      const tc = parseFloat(pg.tcPago) || tcFallback;
      return s + (parseFloat(pg.monto)||0) * tc;
    }, 0);

    // Si no hay facturas cargadas, fallback: saldo USD × TC cierre (comportamiento anterior)
    if(facturas.length === 0) {
      return tcFallback ? saldoUSD * tcFallback : null;
    }

    const ncPesos = pesosFacturado - pesosPagado;
    return ncPesos > 0 ? ncPesos : 0;
  }

  // Abierto: simple conversión al TC del día
  return state.tcBna ? saldoUSD * state.tcBna : null;
}
function badge(estado) {
  const map = { pendiente:'Pendiente', pagado:'Pagado', parcial:'Pago Parcial', facturado:'Facturado', sin_factura:'Sin Factura', diferencia:'Diferencia', vigente:'Vigente' };
  return `<span class="badge b-${estado}">${map[estado]||estado}</span>`;
}
function calcTotales(items, ivaIncluido, tipoIva) {
  const neto = items.reduce((s,it) => s + (parseFloat(it.precioUnit)||0)*(parseFloat(it.cantidad)||0), 0);
  let conIva;
  const tipo = tipoIva || (ivaIncluido ? 'incluido' : '21');
  if(tipo === 'incluido') conIva = neto;
  else if(tipo === '10.5') conIva = neto * 1.105;
  else conIva = neto * 1.21;
  return { neto, conIva, tipo };
}
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── SAVE / DELETE ────────────────────────────────────────────────────────
async function savePresupuesto(data) {
  const id = data.id || uid();
  await set(ref(db, `presupuestos/${id}`), { ...data, id });
  toast('✅ Presupuesto guardado');
}
async function saveFactura(data) {
  const id = uid();
  await set(ref(db, `facturas/${id}`), { ...data, id });
  toast('✅ Factura registrada');
}
async function savePago(data) {
  const id = uid();
  await set(ref(db, `pagos/${id}`), { ...data, id });
  toast('💳 Pago asentado');
}
async function toggleCerrarPpto(id) {
  const p = state.presupuestos[id];
  if(!p) return;
  // Si el ppto aparece en "cancelados" pero no tiene flag cerrado (fue pagado automáticamente),
  // al apretar 🔓 debe permitir "reabrir" creando un estado opuesto
  if(!p.cerrado) {
    // Si llegó acá significa que el usuario quiere "desmarcarlo como pagado",
    // pero como está pagado por los pagos no podemos simplemente cambiar el flag.
    // Le avisamos al usuario.
    const abonado = getPagosDePresupuesto(id);
    const total = parseFloat(p.totalConIva)||0;
    if(abonado >= total - 1) {
      alert('Este presupuesto está pagado porque los pagos cubren el total ($' + fmt(abonado, p.moneda) + ').\nPara reabrirlo, eliminá o reducí algún pago en la pestaña Pagos.');
      return;
    }
  }
  if(!p.cerrado) {
    // Cerrar: guardar el TC del último pago para que quede fijo
    const tcUltimo = getTcUltimoPago(id) || state.tcBna;
    const confirma = confirm('¿Marcar este presupuesto como ABONADO?\n\nLa Nota de Crédito en pesos se calculará como:\n(Total facturado USD × TC factura) − (Total pagado USD × TC pago real)\n\nEsto refleja la diferencia cambiaria real.');
    if(!confirma) return;
    await set(ref(db, 'presupuestos/'+id), { ...p, cerrado: true, tcCierre: tcUltimo, fechaCierre: hoy() });
    toast('✅ Presupuesto marcado como abonado');
  } else {
    if(!confirm('¿Reabrir este presupuesto? Volverá a calcularse el saldo con el TC del día.')) return;
    const { cerrado, tcCierre, fechaCierre, ...rest } = p;
    await set(ref(db, 'presupuestos/'+id), rest);
    toast('🔓 Presupuesto reabierto');
  }
}

async function deletePpto(id) {
  if(!confirm("Eliminar este presupuesto? Tambien se eliminaran sus facturas y pagos asociados.")) return;
  const pagoIds = Object.values(state.pagos).filter(p=>p.presupuestoId===id).map(p=>p.id);
  for(const pid of pagoIds) await remove(ref(db, "pagos/"+pid));
  const factIds = Object.values(state.facturas).filter(f=>f.presupuestoId===id).map(f=>f.id);
  for(const fid of factIds) await remove(ref(db, "facturas/"+fid));
  await remove(ref(db, "presupuestos/"+id));
  toast("Presupuesto y datos asociados eliminados");
}
async function deleteFactura(id) {
  if(!confirm("Eliminar esta factura?")) return;
  await remove(ref(db, "facturas/"+id));
  toast("Factura eliminada");
}
async function deletePago(id) {
  if(!confirm("Eliminar este pago?")) return;
  await remove(ref(db, "pagos/"+id));
  toast("Pago eliminado");
}


// ─── RENDER ───────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  const pptos = Object.values(state.presupuestos);
  const facts = Object.values(state.facturas);
  const pgs = Object.values(state.pagos);
  const proveedores = [...new Set(pptos.map(p=>p.proveedor))].sort();

  return `
    ${buildHeader(pptos.length, facts.length, pgs.length)}
    ${buildTabs()}
    <div class="content">
      ${state.tab === 'presupuestos' ? buildTabPresupuestos(pptos) : ''}
      ${state.tab === 'facturas' ? buildTabFacturas(facts) : ''}
      ${state.tab === 'pagos' ? buildTabPagos(pgs) : ''}
      ${state.tab === 'cta' ? buildTabCta(proveedores) : ''}
    </div>
    ${state.modal ? buildModal() : ''}
  `;
}

function buildHeader(np, nf, npg) {
  // Calcular presupuestos con falta de facturación (de TODOS, incluso cancelados)
  const alertasFactura = Object.values(state.presupuestos).filter(p => {
    if(p.notaFacturaCerrada) return false;
    const abonado = getPagosDePresupuesto(p.id);
    if(abonado <= 0) return false;
    const facts = Object.values(state.facturas).filter(f => f.presupuestoId === p.id);
    const totalFacturado = facts.reduce((s,f)=>s+(parseFloat(f.montoFacturado)||0),0);
    const faltaFacturar = (parseFloat(p.totalConIva)||0) - totalFacturado;
    return faltaFacturar > 1;
  });
  const cantAlertas = alertasFactura.length;
  return `
  <div class="header">
    <div>
      <div class="header-sub">GESTIÓN COMPARTIDA DE PROVEEDORES</div>
      <div style="font-family:monospace;font-size:11px;color:var(--yellow);margin-top:4px;display:flex;align-items:center;gap:6px">
        💵 TC BNA Venta: $<input type="number" id="tcManual" value="${state.tcBna||''}" placeholder="ingresar" style="width:90px;padding:2px 6px;background:#0f1117;border:1px solid var(--border);color:var(--yellow);border-radius:4px;font-family:monospace;font-size:11px" oninput="window.actualizarTc(this.value)"/>
      </div>
      <div class="header-title">💼 Proveedores & Pagos</div>
    </div>
    <div class="stats">
      ${cantAlertas > 0 ? `
      <div class="stat-chip" data-action="toggle_alertas" style="background:linear-gradient(135deg,#3f1f10,#4a2818);border-color:#f59e0b;cursor:pointer;position:relative">
        <div class="num" style="color:#fbbf24">⚠️ ${cantAlertas}</div>
        <div class="lbl" style="color:#fcd34d">FALTA FACT.</div>
      </div>` : ''}
      <div class="stat-chip"><div class="num" style="color:var(--accent)">${np}</div><div class="lbl">PRESUPUESTOS</div></div>
      <div class="stat-chip"><div class="num" style="color:var(--purple)">${nf}</div><div class="lbl">FACTURAS</div></div>
      <div class="stat-chip"><div class="num" style="color:var(--green)">${npg}</div><div class="lbl">PAGOS</div></div>
    </div>
  </div>

  ${state.alertasAbiertas && cantAlertas > 0 ? `
  <div style="background:linear-gradient(180deg,#3f1f10,#1a1d35);border-bottom:1px solid #f59e0b;padding:14px 24px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="color:#fbbf24;font-weight:700;font-size:14px;font-family:'Syne',sans-serif">⚠️ Presupuestos abonados sin facturar (${cantAlertas})</div>
      <button class="btn-sm" data-action="toggle_alertas" style="background:#1e2235;color:var(--muted);font-size:11px">✕ Cerrar</button>
    </div>
    <div style="max-height:280px;overflow-y:auto">
      ${alertasFactura.map(p => {
        const facts = Object.values(state.facturas).filter(f => f.presupuestoId === p.id);
        const totalFacturado = facts.reduce((s,f)=>s+(parseFloat(f.montoFacturado)||0),0);
        const faltaFacturar = (parseFloat(p.totalConIva)||0) - totalFacturado;
        return `
        <div style="background:#12162a;border:1px solid #2d3154;border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div style="flex:1;min-width:200px">
            <div style="color:var(--text);font-weight:600;font-size:13px">${p.proveedor} — ${p.descripcion}</div>
            <div style="color:var(--dim);font-size:11px;font-family:monospace;margin-top:2px">📅 ${p.fecha} · ${facts.length>0?'Fact: '+facts.map(f=>f.nroFactura).join(', '):'Sin factura cargada'}</div>
            <div style="color:#fbbf24;font-size:12px;margin-top:4px;font-weight:600">Falta facturar: ${fmt(faltaFacturar, p.moneda)}</div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn-sm btn-factura" data-action="factura" data-id="${p.id}" style="font-size:11px">🧾 Cargar Factura</button>
            <button class="btn-sm" data-action="cerrar_nota_factura" data-id="${p.id}" style="background:#7c2d12;color:#fff;font-size:11px">✓ Recibida</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}`;
}

function buildTabs() {
  const tabs = [
    {id:'presupuestos', label:'📋 Presupuestos'},
    {id:'facturas', label:'🧾 Facturas'},
    {id:'pagos', label:'💳 Pagos'},
    {id:'cta', label:'📊 Cta. Cte.'},

  return `<div class="tabs">${tabs.map(t=>`<button class="tab-btn${state.tab===t.id?' active':''}" data-tab="${t.id}">${t.label}</button>`).join('')}</div>`;

// ── PRESUPUESTOS ─────────────────────────────────────────────────────────
function buildTabPresupuestos(pptos) {
  const filtrados = pptos.filter(p => {
    const mp = !state.filtroProveedor || p.proveedor.toLowerCase().includes(state.filtroProveedor.toLowerCase());
    const ep = estadoPago(p.id);
    const me = state.filtroEstado === 'todos' || ep === state.filtroEstado;
    return mp && me;
  });
  // Separar pendientes/parciales de pagados
  const activos = filtrados.filter(p => estadoPago(p.id) !== 'pagado');
  const pagados = filtrados.filter(p => estadoPago(p.id) === 'pagado');

  return `
  <div class="section-header">
    <div class="section-title">Presupuestos de Proveedores</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <label class="btn btn-dark" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin:0">
        📥 Importar CSV
        <input type="file" accept=".csv" style="display:none" onchange="if(this.files[0]) window.importarCsvRepuestos(this.files[0])"/>
      </label>
      <button class="btn btn-accent" id="btnNuevoPpto">＋ Nuevo Presupuesto</button>
    </div>
  </div>
  <div class="filters">
    <input style="max-width:220px" placeholder="🔍 Buscar proveedor…" id="filtProv" value="${state.filtroProveedor}"/>
    <select style="max-width:200px" id="filtEst">
      <option value="todos" ${state.filtroEstado==='todos'?'selected':''}>Todos los estados</option>
      <option value="pendiente" ${state.filtroEstado==='pendiente'?'selected':''}>Pendiente pago</option>
      <option value="parcial" ${state.filtroEstado==='parcial'?'selected':''}>Pago parcial</option>
      <option value="pagado" ${state.filtroEstado==='pagado'?'selected':''}>Pagados</option>
    </select>
  </div>
  ${filtrados.length === 0 ? '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No hay presupuestos. ¡Cargá el primero!</div></div>' : `
    ${activos.length > 0 ? activos.map(p => buildCardPpto(p)).join('') : ''}
    ${pagados.length > 0 ? `
      <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0" data-action="toggle_archivados">
          <div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--green);pointer-events:none">✅ Presupuestos Cancelados (${pagados.length})</div>
          <div style="color:var(--muted);font-size:12px;pointer-events:none">${state.archivadosAbiertos?'▼ Ocultar':'▶ Ver lista'}</div>
        </div>
        ${state.archivadosAbiertos ? `
          <div style="background:#0f1117;border:1px solid var(--border);border-radius:10px;padding:8px;margin-top:8px">
            ${pagados.map(p => {
              const facts = getFacturasDePresupuesto(p.id);
              return `
              <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #1e2235;flex-wrap:wrap;gap:6px">
                <div style="flex:1;min-width:200px">
                  <div style="color:var(--text);font-size:13px;font-weight:600">${p.proveedor} — ${p.descripcion}</div>
                  <div style="color:var(--dim);font-size:11px;font-family:monospace">📅 ${p.fecha} · ${facts.length>0?'Fact: '+facts.map(f=>f.nroFactura).join(', '):'Sin factura'}${p.cerrado&&p.tcCierre?' · TC cierre: $'+p.tcCierre:''}</div>
                </div>
                <div style="color:var(--green);font-weight:700;font-size:13px;font-family:monospace">${p.cerrado?'✅ Abonado':'✅'} ${fmt(p.totalConIva, p.moneda)}</div>
                <div style="display:flex;gap:4px">
                  <button class="btn-sm" data-action="toggle_cerrar" data-id="${p.id}" style="font-size:11px;padding:4px 8px;background:#7c2d12;color:#fff" title="Reabrir presupuesto">🔓</button>
                  <button class="btn-sm btn-edit" data-action="edit" data-id="${p.id}" style="font-size:11px;padding:4px 8px">✏</button>
                  <button class="btn-sm btn-delete" data-action="delete" data-id="${p.id}" style="font-size:11px;padding:4px 8px">🗑</button>

// Toggle archivados
window.toggleArchivados = function() {
  state.archivadosAbiertos = !state.archivadosAbiertos;
  render();
};

function buildCardPpto(p) {
  const facts = getFacturasDePresupuesto(p.id);
  const abonado = getPagosDePresupuesto(p.id);
  const ep = estadoPago(p.id);
  const saldo = (parseFloat(p.totalConIva)||0) - abonado;
  const items = p.items || [];
  // Calcular falta de factura
  const totalFacturado = facts.reduce((s,f)=>s+(parseFloat(f.montoFacturado)||0),0);
  const faltaFacturar = (parseFloat(p.totalConIva)||0) - totalFacturado;
  const tieneFaltaFactura = abonado > 0 && faltaFacturar > 1 && !p.notaFacturaCerrada;
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div>
        <div class="card-title">${p.proveedor}</div>
        <div class="card-sub">${p.descripcion}</div>
        <div class="card-meta">📅 ${p.fecha} · ${p.moneda} · IVA ${p.tipoIva==='incluido'?'incluido':p.tipoIva==='10.5'?'+ 10.5%':'+ 21%'} · Válido ${p.validezDias} días</div>
      </div>
      <div style="text-align:right">
        ${badge(ep)}
        ${facts.length===0 ? badge('sin_factura') : badge('facturado')}
      </div>
    </div>
    <div class="montos">
      <div class="monto-chip"><div class="ml">Presupuesto</div><div class="mv" style="color:var(--accent)">${fmt(p.totalConIva, p.moneda)}</div></div>
      <div class="monto-chip"><div class="ml">Abonado</div><div class="mv" style="color:var(--green)">${fmt(abonado, p.moneda)}</div></div>
      <div class="monto-chip"><div class="ml">Total Facturado</div><div class="mv" style="color:var(--purple)">${fmt(facts.reduce((s,f)=>s+(parseFloat(f.montoFacturado)||0),0), p.moneda)}</div></div>
      <div class="monto-chip"><div class="ml">Saldo${p.moneda==='USD'&&p.cerrado?' / NC en $':''}</div><div class="mv" style="color:${saldo>1?'var(--yellow)':'var(--green)'}">${(()=>{ if(p.moneda!=='USD') return fmt(saldo,p.moneda); const sp = saldoEnPesos(p); if(sp===null) return fmt(saldo,'USD'); return fmt(saldo,'USD') + ' <span style="color:var(--dim);font-size:11px;font-family:monospace">(' + (p.cerrado?'NC: ':'') + fmt(sp,'ARS') + (p.cerrado?' dif. cambiaria':'') + ')</span>'; })()}</div></div>
    </div>
    ${items.filter(it=>it.desc||it.precioUnit).length > 0 ? `
    <div class="items-detail">
      ${items.filter(it=>it.desc||it.precioUnit).map(it=>`
        <div class="item-detail-row">
          <span>${it.cantidad}× ${it.desc||'—'}</span>
          <span>${fmt((parseFloat(it.precioUnit)||0)*(parseFloat(it.cantidad)||0), p.moneda)}</span>
        </div>`).join('')}
    </div>` : ''}
    ${p.notas ? `<div style="color:var(--dim);font-size:12px;margin-top:8px">📝 ${p.notas}</div>` : ''}
    <div class="card-actions">
      <button class="btn-sm btn-factura" data-action="factura" data-id="${p.id}">🧾 Cargar Factura</button>
      <button class="btn-sm btn-pago" data-action="pago" data-id="${p.id}">💳 Registrar Pago</button>
      <button class="btn-sm" data-action="toggle_cerrar" data-id="${p.id}" style="background:${p.cerrado?'#7c2d12':'#14532d'};color:#fff">${p.cerrado?'🔓 Reabrir':'✅ Marcar Abonado'}</button>
      <button class="btn-sm btn-edit" data-action="edit" data-id="${p.id}">✏ Editar</button>
      <button class="btn-sm btn-delete" data-action="delete" data-id="${p.id}">🗑</button>
    </div>
  </div>`;
}

  ${facts.length === 0 ? '<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">No hay facturas. Cargalas desde Presupuestos.</div></div>' :

          <div class="monto-chip"><div class="ml">Presupuestado</div><div class="mv" style="color:var(--dim)">${fmt(ppto?.totalConIva, ppto?.moneda)}</div></div>
          ${f.hayDiferencia ? `<div class="monto-chip"><div class="ml">Diferencia</div><div class="mv" style="color:var(--red)">${fmt(Math.abs(diff), f.moneda)}</div></div>` : ''}
          <div class="monto-chip"><div class="ml">Abonado</div><div class="mv" style="color:var(--green)">${fmt(abonado, f.moneda)}</div></div>

          <button class="btn-sm btn-edit" data-action="edit_factura" data-id="${f.id}">✏ Editar Factura</button>

    }).join('')}`;
}

// ── CTA ───────────────────────────────────────────────────────────────────
function buildTabCta(proveedores) {
  if(proveedores.length === 0) return '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">No hay proveedores cargados aún.</div></div>';
  // Aplicar filtro de búsqueda
  const proveedoresFiltrados = state.filtroCtaProveedor
    ? proveedores.filter(p => p.toLowerCase().includes(state.filtroCtaProveedor.toLowerCase()))
    : proveedores;
  return `
  <div class="section-header"><div class="section-title">Cuenta Corriente por Proveedor</div></div>
  <div class="filters" style="margin-bottom:16px">
    <input style="max-width:280px" placeholder="🔍 Buscar proveedor…" id="filtCtaProv" value="${state.filtroCtaProveedor||''}"/>
  </div>

  ${(()=>{
    const todosLosPptos = Object.values(state.presupuestos);
    // Separar por moneda
    const pptosArs = todosLosPptos.filter(p => p.moneda !== 'USD');
    const pptosUsd = todosLosPptos.filter(p => p.moneda === 'USD');

    const totalArs = pptosArs.reduce((s,p)=>s+(parseFloat(p.totalConIva)||0),0);
    const abArs = pptosArs.reduce((s,p)=>s+getPagosDePresupuesto(p.id),0);
    const saldoArs = totalArs - abArs;

    const totalUsd = pptosUsd.reduce((s,p)=>s+(parseFloat(p.totalConIva)||0),0);
    const abUsd = pptosUsd.reduce((s,p)=>s+getPagosDePresupuesto(p.id),0);
    const saldoUsd = totalUsd - abUsd;
    // Saldo USD convertido a pesos al TC del día
    const saldoUsdEnArs = state.tcBna ? saldoUsd * state.tcBna : null;

    // % global ponderado (en pesos equivalente)
    const totalPesosEquiv = totalArs + (state.tcBna ? totalUsd * state.tcBna : 0);
    const abPesosEquiv = abArs + (state.tcBna ? abUsd * state.tcBna : 0);
    const pctGen = totalPesosEquiv>0 ? Math.min(Math.round((abPesosEquiv/totalPesosEquiv)*100),100) : 0;

    return `
    <div style="background:linear-gradient(135deg,#1a1d35,#12162a);border:2px solid var(--accent);border-radius:16px;padding:20px;margin-bottom:24px">
      <div style="font-family:'Syne',sans-serif;font-size:13px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;font-weight:700">📊 Resumen General</div>

      ${totalArs > 0 ? `
      <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="color:var(--muted);font-size:11px;font-family:monospace;letter-spacing:1px;margin-bottom:8px">💵 PRESUPUESTOS EN PESOS (ARS)</div>
        <div class="montos" style="gap:24px">
          <div class="monto-chip"><div class="ml">Presupuestado</div><div class="mv" style="color:var(--accent);font-size:16px">${fmt(totalArs,'ARS')}</div></div>
          <div class="monto-chip"><div class="ml">Abonado</div><div class="mv" style="color:var(--green);font-size:16px">${fmt(abArs,'ARS')}</div></div>
          <div class="monto-chip"><div class="ml">Saldo Pendiente</div><div class="mv" style="color:${saldoArs>1?'var(--yellow)':'var(--green)'};font-size:16px">${fmt(Math.max(saldoArs,0),'ARS')}</div></div>
        </div>
      </div>` : ''}

      ${totalUsd > 0 ? `
      <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div style="color:var(--muted);font-size:11px;font-family:monospace;letter-spacing:1px;margin-bottom:8px">💵 PRESUPUESTOS EN DÓLARES (USD)${state.tcBna ? ' · TC $'+state.tcBna : ''}</div>
        <div class="montos" style="gap:24px">
          <div class="monto-chip"><div class="ml">Presupuestado USD</div><div class="mv" style="color:var(--accent);font-size:16px">${fmt(totalUsd,'USD')}</div></div>
          <div class="monto-chip"><div class="ml">Abonado USD</div><div class="mv" style="color:var(--green);font-size:16px">${fmt(abUsd,'USD')}</div></div>
          <div class="monto-chip"><div class="ml">Saldo Pendiente USD</div><div class="mv" style="color:${saldoUsd>1?'var(--yellow)':'var(--green)'};font-size:16px">${fmt(Math.max(saldoUsd,0),'USD')}</div></div>
          ${state.tcBna ? `<div class="monto-chip"><div class="ml">Saldo equiv. en $ARS (TC $${state.tcBna})</div><div class="mv" style="color:${saldoUsd>1?'var(--yellow)':'var(--green)'};font-size:15px">${fmt(Math.max(saldoUsdEnArs,0),'ARS')}</div></div>` : ''}
        </div>
      </div>` : ''}

      <div class="montos" style="gap:24px">
        <div class="monto-chip"><div class="ml">Proveedores</div><div class="mv" style="color:var(--purple);font-size:18px">${proveedores.length}</div></div>
      </div>
      <div class="progress-wrap" style="margin-top:16px"><div class="progress-bar" style="width:${pctGen}%;background:${pctGen>=100?'var(--green)':'linear-gradient(90deg,var(--accent),var(--green))'}"></div></div>
      <div class="progress-pct">${pctGen}% abonado del total (equivalente en pesos)</div>
    </div>`;
  })()}

  ${proveedoresFiltrados.map(prov => {
    const pptos = Object.values(state.presupuestos).filter(p=>p.proveedor===prov);
    const moneda = pptos[0]?.moneda||'ARS';
    const totalPpto = pptos.reduce((s,p)=>s+(parseFloat(p.totalConIva)||0),0);
    const totalAb = pptos.reduce((s,p)=>s+getPagosDePresupuesto(p.id),0);
    const saldo = totalPpto - totalAb;
    // Saldo en pesos: cada ppto USD usa su TC correcto (fijo si cerrado, día si no)
    const saldoEnPesosProv = moneda==='USD' ? pptos.reduce((s,p)=>{ const sp = saldoEnPesos(p); return s + (sp||0); }, 0) : null;
    const pct = totalPpto > 0 ? Math.min(Math.round((totalAb/totalPpto)*100),100) : 0;
    const ep = saldo<=1?'pagado':totalAb>0?'parcial':'pendiente';
    const pagosProv = Object.values(state.pagos).filter(pg=>pptos.some(p=>p.id===pg.presupuestoId));
    return `
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800">${prov}</div>
          <div style="color:var(--dim);font-size:12px;margin-top:2px">${pptos.length} presupuesto(s)</div>
        </div>
        ${badge(ep)}
      </div>
      <div class="montos">
        <div class="monto-chip"><div class="ml">Total Presupuestado (${moneda})</div><div class="mv" style="color:var(--accent)">${fmt(totalPpto,moneda)}</div></div>
        ${moneda==='USD' && state.tcBna ? `<div class="monto-chip"><div class="ml">Equivalente en $ARS (TC $${state.tcBna})</div><div class="mv" style="color:var(--accent);font-size:12px">${fmt(totalPpto*state.tcBna,'ARS')}</div></div>` : ''}
        <div class="monto-chip"><div class="ml">Total Abonado (${moneda})</div><div class="mv" style="color:var(--green)">${fmt(totalAb,moneda)}</div></div>
        ${moneda==='USD' ? `<div class="monto-chip"><div class="ml">Abonado en $ARS (real)</div><div class="mv" style="color:var(--green);font-size:12px">${fmt(pagosProv.reduce((s,pg)=>s+(pg.montoPesos||0),0),'ARS')}</div></div>` : ''}
        <div class="monto-chip"><div class="ml">Saldo Pendiente (${moneda})</div><div class="mv" style="color:${saldo>1?'var(--yellow)':'var(--green)'}">${fmt(Math.max(saldo,0),moneda)}</div></div>
        ${moneda==='USD' && state.tcBna && saldo>1 ? `<div class="monto-chip"><div class="ml">Saldo en $ARS (TC $${state.tcBna})</div><div class="mv" style="color:${saldo>1?'var(--yellow)':'var(--green)'};font-size:12px">${fmt(saldo*state.tcBna,'ARS')}</div></div>` : ''}
        ${moneda==='USD' && saldoEnPesosProv!==null && saldoEnPesosProv>0 ? `<div class="monto-chip"><div class="ml">NC en $ARS (cerrados)</div><div class="mv" style="color:var(--purple);font-size:12px">${fmt(saldoEnPesosProv,'ARS')}</div></div>` : ''}
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${saldo<=1?'var(--green)':'linear-gradient(90deg,var(--accent),var(--green))'}"></div></div>
      <div class="progress-pct">${pct}% abonado</div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
        ${pptos.map(p => {
          const ab = getPagosDePresupuesto(p.id);
          const sl = (parseFloat(p.totalConIva)||0) - ab;
          const facts = getFacturasDePresupuesto(p.id);
          return `
          <div class="cta-row">
            <div>
              <div style="color:var(--muted);font-size:13px">${p.descripcion}</div>
              <div style="color:var(--dim);font-size:11px;font-family:monospace">${p.fecha} · ${facts.length>0?'Factura: '+facts.map(f=>f.nroFactura).join(', '):'Sin factura'}</div>
            </div>
            <div style="text-align:right">
              <div style="color:${sl<=1?'var(--green)':'var(--yellow)'};font-weight:700;font-size:13px;font-family:monospace">${sl<=1?(p.cerrado?'✅ Abonado':'✅ Pagado'):'Saldo: '+fmt(sl,p.moneda)}</div>
              ${p.moneda==='USD'&&sl>1 ? `<div style="color:var(--dim);font-size:11px;font-family:monospace">${(()=>{ const sp=saldoEnPesos(p); if(sp===null) return ''; return (p.cerrado?'NC: ':'≈ ')+fmt(sp,'ARS')+(p.cerrado?' (dif. cambiaria)':' (TC $'+state.tcBna+')'); })()}</div>` : ''}
              <div style="color:var(--dim);font-size:11px">Ppto: ${fmt(p.totalConIva,p.moneda)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${pagosProv.length>0 ? `
      <div class="pagos-list">
        <div style="color:var(--muted);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-family:monospace">Pagos Registrados</div>
        ${pagosProv.map(pg=>`
          <div class="pago-row">
            <span>📅 ${pg.fechaPago} · ${pg.formaPago}${pg.comprobante?' · '+pg.comprobante:''}</span>
            <span style="color:var(--green);font-weight:700">${fmt(pg.monto,pg.moneda)}</span>
          </div>`).join('')}
      </div>` : ''}
    </div>`;
  }).join('')}`;
}

    </div>
    <div class="grid-2">
      <div class="field"><label class="field-label">Fecha de Pago</label><input type="date" id="p_fecha" value="${d.fechaPago||hoy()}"/></div>
      <div class="field"><label class="field-label">Monto Abonado (${moneda})</label><input type="number" id="p_monto" value="${d.monto||''}" oninput="calcPesosPago()"/></div>
    </div>
    ${moneda==='USD' ? `
    <div class="grid-2">
      <div class="field"><label class="field-label">TC BNA Vendedor</label><input type="number" id="p_tc" value="${d.tcPago||state.tcBna||''}" placeholder="Ej: 1430" oninput="calcPesosPago()"/></div>
      <div class="field"><label class="field-label">Equivalente en Pesos</label><input type="number" id="p_pesos" value="${d.montoPesos||''}" placeholder="Se calcula automático" readonly style="background:#0a0d1a;color:var(--green);font-weight:700"/></div>
    </div>` : ''}
    <div class="grid-2">
      <div class="field"><label class="field-label">Forma de Pago</label>
        <select id="p_forma">
          <option value="transferencia" ${d.formaPago==='transferencia'?'selected':''}>Transferencia</option>
          <option value="cheque" ${d.formaPago==='cheque'?'selected':''}>Cheque</option>
          <option value="efectivo" ${d.formaPago==='efectivo'?'selected':''}>Efectivo</option>
          <option value="debito" ${d.formaPago==='debito'?'selected':''}>Débito</option>
          <option value="credito" ${d.formaPago==='credito'?'selected':''}>Crédito</option>
        </select>
      </div>
      <div class="field"><label class="field-label">Banco / Entidad</label><input id="p_banco" value="${d.banco||''}"/></div>
    </div>
    <div class="field"><label class="field-label">Nro. Comprobante / Referencia</label><input id="p_comprobante" value="${d.comprobante||''}"/></div>
    <div class="field"><label class="field-label">Notas</label><textarea id="p_notas">${d.notas||''}</textarea></div>
    <div class="modal-footer">
      <button class="btn btn-dark" id="modalClose">Cancelar</button>
      <button class="btn btn-green" id="updatePago">💳 Guardar Cambios</button>
    </div>`;
  }

  return `
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      ${content}
    </div>
  </div>`;
}

// ─── EVENTS (delegación global) ───────────────────────────────────────────
let eventsAttached = false;
function attachEvents() {
  if(eventsAttached) return;
  eventsAttached = true;
  document.getElementById('app').addEventListener('click', handleClick);
  document.getElementById('app').addEventListener('input', handleInput);
  document.getElementById('app').addEventListener('change', handleChange);
}

function saveFormState() {
  // Guarda todos los campos del formulario en state.editData antes de re-renderizar
  if(state.modal === 'nuevo_ppto' || state.modal === 'editar_ppto') {
    const prov = document.getElementById('m_proveedor');
    const desc = document.getElementById('m_descripcion');
    const fecha = document.getElementById('m_fecha');
    const moneda = document.getElementById('m_moneda');
    const iva = document.getElementById('m_iva');
    const validez = document.getElementById('m_validez');
    const notas = document.getElementById('m_notas');
    if(prov) state.editData.proveedor = prov.value;
    if(desc) state.editData.descripcion = desc.value;
    if(fecha) state.editData.fecha = fecha.value;
    if(moneda) state.editData.moneda = moneda.value;
    if(iva) { state.editData.tipoIva = iva.value; state.editData.ivaIncluido = iva.value === 'incluido'; }
    if(validez) state.editData.validezDias = parseInt(validez.value) || 30;
    if(notas) state.editData.notas = notas.value;
    // Guardar items actuales
    document.querySelectorAll('[data-item]').forEach(inp => {
      const i = parseInt(inp.dataset.item);
      const field = inp.dataset.field;
      if(!state.editData.items[i]) state.editData.items[i]={desc:'',cantidad:1,precioUnit:''};
      state.editData.items[i][field] = inp.value;
    });
  }
}

function handleClick(e) {
  let t = e.target;

  // Si hizo clic en un hijo de un botón con data-action, usar el botón padre
  const actionEl = t.closest && t.closest('[data-action]');
  if(actionEl) t = actionEl;

  // Tabs
  if(t.classList && t.classList.contains('tab-btn')) { state.tab = t.dataset.tab; render(); return; }

  // Nuevo presupuesto
  if(t.id === 'btnNuevoPpto') { state.modal='nuevo_ppto'; state.editData={items:[{desc:'',cantidad:1,precioUnit:''}]}; render(); return; }

  // Card actions
  if(t.dataset && t.dataset.action) {
    const action = t.dataset.action;
    const id = t.dataset.id;
    const fid = t.dataset.fid;
    const pid = t.dataset.pid;
    if(action==='delete') { deletePpto(id); return; }
    if(action==='toggle_cerrar') { toggleCerrarPpto(id); return; }
    if(action==='toggle_archivados') { state.archivadosAbiertos = !state.archivadosAbiertos; render(); return; }
    if(action==='toggle_alertas') { state.alertasAbiertas = !state.alertasAbiertas; render(); return; }
    if(action==='cerrar_nota_factura') {
      const p = state.presupuestos[id];
      if(p && confirm('¿Confirmás que ya recibiste toda la facturación de este presupuesto?')) {
        set(ref(db, 'presupuestos/'+id), { ...p, notaFacturaCerrada: true }).then(() => toast('✅ Alerta cerrada'));
      }
      return;
    }
    if(action==='edit_factura') { state.modal='editar_factura'; state.editData=JSON.parse(JSON.stringify(state.facturas[id])); render(); return; }
    if(action==='edit_pago') { state.modal='editar_pago'; state.editData=JSON.parse(JSON.stringify(state.pagos[id])); render(); return; }
    if(action==='delete_factura') { deleteFactura(id); return; }
    if(action==='delete_pago') { deletePago(id); return; }
    if(action==='edit') { state.modal='editar_ppto'; state.editData=JSON.parse(JSON.stringify(state.presupuestos[id])); render(); return; }
    if(action==='factura') { state.modal='factura'; state.editData={presupuestoId:id}; render(); return; }
    if(action==='pago') { state.modal='pago'; state.editData={presupuestoId:id}; render(); return; }
    if(action==='pago_factura') { state.modal='pago'; state.editData={presupuestoId:pid, facturaId:fid}; render(); return; }
  }

  // Cerrar modal
  if(t.id === 'modalClose' || t.id === 'modalOverlay') { state.modal=null; state.editData=null; render(); return; }

  // Agregar ítem
  if(t.id === 'addItem') {
    saveFormState();
    if(!state.editData.items) state.editData.items=[];
    state.editData.items.push({desc:'',cantidad:1,precioUnit:''});
    render(); return;
  }

  // Quitar ítem
  if(t.dataset.remove !== undefined) {
    saveFormState();
    const i = parseInt(t.dataset.remove);
    state.editData.items.splice(i,1);
    if(state.editData.items.length===0) state.editData.items=[{desc:'',cantidad:1,precioUnit:''}];
    render(); return;
  }

  // Guardar presupuesto
  if(t.id === 'savePpto') {
    const prov = document.getElementById('m_proveedor')?.value.trim();
    const desc = document.getElementById('m_descripcion')?.value.trim();
    if(!prov||!desc) { alert('Completá proveedor y descripción'); return; }
    const items = state.editData.items || [];
    const tipoIva = document.getElementById('m_iva')?.value || '21';
    const ivaIncluido = tipoIva === 'incluido';
    const { neto, conIva } = calcTotales(items, ivaIncluido, tipoIva);
    const data = {
      id: state.editData.id || null,
      proveedor: prov,
      descripcion: desc,
      fecha: document.getElementById('m_fecha')?.value,
      moneda: document.getElementById('m_moneda')?.value,
      ivaIncluido,
      tipoIva,
      validezDias: parseInt(document.getElementById('m_validez')?.value)||30,
      items,
      notas: document.getElementById('m_notas')?.value || '',
      totalNeto: neto,
      totalConIva: conIva,
      estado: 'vigente',
      // Preservar campos de cierre si el presupuesto estaba cerrado
      ...(state.editData.cerrado ? { cerrado: true, tcCierre: state.editData.tcCierre, fechaCierre: state.editData.fechaCierre } : {}),
    };
    savePresupuesto(data).then(() => {
      // Limpiar formulario pero mantener modal abierto para seguir cargando
      state.editData = {items:[{desc:'',cantidad:1,precioUnit:''}]};
      render();
    });
    return;
  }

  // Guardar factura
  if(t.id === 'saveFactura') {
    const nro = document.getElementById('f_nro')?.value.trim();
    const monto = parseFloat(document.getElementById('f_monto')?.value)||0;
    if(!nro) { alert('Ingresá el número de factura'); return; }
    const ppto = state.presupuestos[state.editData.presupuestoId];
    // Sumar facturas anteriores del mismo presupuesto para calcular diferencia acumulada
    const facturasAnteriores = Object.values(state.facturas)
      .filter(f => f.presupuestoId === state.editData.presupuestoId)
      .reduce((s, f) => s + (parseFloat(f.montoFacturado)||0), 0);
    const totalFacturado = facturasAnteriores + monto;
    const diff = totalFacturado - (parseFloat(ppto?.totalConIva)||0);
    const presupuestoIdActual = state.editData.presupuestoId;
    const monedaActual = document.getElementById('f_moneda')?.value || ppto?.moneda || 'ARS';
    const tcFactura = parseFloat(document.getElementById('f_tc')?.value) || null;
    const descuentoPct = parseFloat(document.getElementById('f_dto_pct')?.value) || 0;
    const descuentoMonto = monto * descuentoPct / 100;
    const montoFinal = monto - descuentoMonto;
    saveFactura({
      presupuestoId: presupuestoIdActual,
      nroFactura: nro,
      fechaFactura: document.getElementById('f_fecha')?.value,
      montoFacturado: monto,
      tcFactura,
      montoPesos: tcFactura ? monto * tcFactura : null,
      descuentoPct,
      descuentoMonto,
      montoFinal,
      moneda: monedaActual,
      hayDiferencia: Math.abs(diff)>1,
      diferencia: diff,
      notas: document.getElementById('f_notas')?.value || '',
    }).then(() => {
      // Limpiar formulario pero mantener modal y presupuesto seleccionado
      state.editData = { presupuestoId: presupuestoIdActual };
      render();
    });
    return;
  }

  // Guardar pago
  if(t.id === 'savePago') {
    const monto = parseFloat(document.getElementById('p_monto')?.value)||0;
    if(!monto) { alert('Ingresá el monto'); return; }
    const ppto = state.presupuestos[state.editData.presupuestoId];
    const fact = state.editData.facturaId ? state.facturas[state.editData.facturaId] : null;
    const presupuestoIdPago = state.editData.presupuestoId;
    const tcPago = parseFloat(document.getElementById('p_tc')?.value) || null;
    const montoPesos = tcPago ? monto * tcPago : null;
    savePago({
      presupuestoId: presupuestoIdPago,
      facturaId: state.editData.facturaId || null,
      fechaPago: document.getElementById('p_fecha')?.value,
      monto,
      tcPago,
      montoPesos,
      formaPago: document.getElementById('p_forma')?.value,
      banco: document.getElementById('p_banco')?.value || '',
      comprobante: document.getElementById('p_comprobante')?.value || '',
      notas: document.getElementById('p_notas')?.value || '',
      moneda: fact?.moneda || ppto?.moneda || 'ARS',
    }).then(() => {
      // Limpiar formulario pero mantener modal y presupuesto seleccionado
      state.editData = { presupuestoId: presupuestoIdPago };
      render();
    });
    return;
  }

  // Actualizar factura existente
  if(t.id === 'updateFactura') {
    const nro = document.getElementById('f_nro')?.value.trim();
    const monto = parseFloat(document.getElementById('f_monto')?.value)||0;
    if(!nro) { alert('Ingresá el número de factura'); return; }
    const ppto = state.presupuestos[state.editData.presupuestoId];
    const otrasFacturas = Object.values(state.facturas)
      .filter(f => f.presupuestoId === state.editData.presupuestoId && f.id !== state.editData.id)
      .reduce((s,f) => s + (parseFloat(f.montoFacturado)||0), 0);
    const totalFacturado = otrasFacturas + monto;
    const diff = totalFacturado - (parseFloat(ppto?.totalConIva)||0);
    const tcFactU = parseFloat(document.getElementById('f_tc')?.value) || null;
    const dtoPctU = parseFloat(document.getElementById('f_dto_pct')?.value) || 0;
    const dtoMontoU = monto * dtoPctU / 100;
    const updated = {
      ...state.editData,
      nroFactura: nro,
      fechaFactura: document.getElementById('f_fecha')?.value,
      montoFacturado: monto,
      tcFactura: tcFactU,
      montoPesos: tcFactU ? monto * tcFactU : null,
      descuentoPct: dtoPctU,
      descuentoMonto: dtoMontoU,
      montoFinal: monto - dtoMontoU,
      moneda: document.getElementById('f_moneda')?.value,
      hayDiferencia: Math.abs(diff)>1,
      diferencia: diff,
      notas: document.getElementById('f_notas')?.value || '',
    };
    set(ref(db, 'facturas/'+updated.id), updated).then(() => {
      toast('✅ Factura actualizada');
      state.modal=null; state.editData=null;
    });
    return;
  }

  // Actualizar pago existente
  if(t.id === 'updatePago') {
    const monto = parseFloat(document.getElementById('p_monto')?.value)||0;
    if(!monto) { alert('Ingresá el monto'); return; }
    const tcPagoU = parseFloat(document.getElementById('p_tc')?.value) || null;
    const updated = {
      ...state.editData,
      fechaPago: document.getElementById('p_fecha')?.value,
      monto,
      tcPago: tcPagoU,
      montoPesos: tcPagoU ? monto * tcPagoU : null,
      formaPago: document.getElementById('p_forma')?.value,
      banco: document.getElementById('p_banco')?.value || '',
      comprobante: document.getElementById('p_comprobante')?.value || '',
      notas: document.getElementById('p_notas')?.value || '',
    };
    set(ref(db, 'pagos/'+updated.id), updated).then(() => {
      toast('✅ Pago actualizado');
      state.modal=null; state.editData=null;
    });
    return;
  }
}

function handleInput(e) {
  const t = e.target;
  // Filtros: preservar foco y posición del cursor
  if(t.id === 'filtProv') {
    state.filtroProveedor = t.value;
    const pos = t.selectionStart;
    render();
    const el = document.getElementById('filtProv');
    if(el) { el.focus(); el.setSelectionRange(pos, pos); }
    return;
  }
  if(t.id === 'filtCtaProv') {
    state.filtroCtaProveedor = t.value;
    const pos = t.selectionStart;
    render();
    const el = document.getElementById('filtCtaProv');
    if(el) { el.focus(); el.setSelectionRange(pos, pos); }
    return;
  }
  // Items del presupuesto
  if(t.dataset.item !== undefined && t.dataset.field) {
    const i = parseInt(t.dataset.item);
    if(!state.editData.items) state.editData.items=[];
    if(!state.editData.items[i]) state.editData.items[i]={desc:'',cantidad:1,precioUnit:''};
    state.editData.items[i][t.dataset.field] = t.value;
    updateTotals(); return;
  }
  // Check diferencia en factura
  if(t.id === 'f_monto') { checkDiff(); return; }
}

function handleChange(e) {
  const t = e.target;
  if(t.id === 'filtEst') { state.filtroEstado = t.value; render(); return; }
  if(t.id === 'm_iva') { state.editData.tipoIva = t.value; state.editData.ivaIncluido = t.value==='incluido'; updateTotals(); return; }
  if(t.id === 'm_moneda') { state.editData.moneda = t.value; updateTotals(); return; }
}

function updateTotals() {
  const items = state.editData.items || [];
  const ivaIncEl = document.getElementById('m_iva');
  const tipoIva = ivaIncEl ? ivaIncEl.value : (state.editData.tipoIva || '21');
  const moneda = document.getElementById('m_moneda')?.value || state.editData.moneda || 'ARS';
  const { neto, conIva } = calcTotales(items, tipoIva==='incluido', tipoIva);
  const tn = document.getElementById('t-neto');
  const tt = document.getElementById('t-total');
  const ti = document.getElementById('t-iva');
  if(tn) tn.textContent = fmt(neto, moneda);
  if(tt) tt.textContent = fmt(conIva, moneda);
  if(ti) { ti.textContent = fmt(neto*(tipoIva==='10.5'?0.105:0.21), moneda); }
  const tiLabel = document.getElementById('t-iva-label');
  if(tiLabel) tiLabel.textContent = 'IVA ' + (tipoIva==='10.5'?'10.5':'21') + '%:';
}

window.toggleFactTcField = function(val) {
  const row = document.getElementById('f_tc_row');
  if(row) row.style.display = val === 'USD' ? '' : 'none';
  calcFacturaDto();
};

function calcFacturaDto() {
  const monto = parseFloat(document.getElementById('f_monto')?.value) || 0;
  const tc = parseFloat(document.getElementById('f_tc')?.value) || 0;
  const dtoPct = parseFloat(document.getElementById('f_dto_pct')?.value) || 0;
  const moneda = document.getElementById('f_moneda')?.value || 'ARS';
  // Pesos equivalente
  const pesosEl = document.getElementById('f_pesos');
  if(pesosEl && tc > 0) pesosEl.value = (monto * tc).toFixed(2);
  // Descuento
  const dtoMonto = monto * dtoPct / 100;
  const dtoMontoEl = document.getElementById('f_dto_monto');
  if(dtoMontoEl) dtoMontoEl.value = dtoMonto.toFixed(2);
  // Resumen descuento
  const res = document.getElementById('dto_resumen');
  const saldoEl = document.getElementById('dto_saldo');
  if(res && saldoEl) {
    if(dtoPct > 0 && monto > 0) {
      const saldoFinal = monto - dtoMonto;
      let html = `<div style="color:var(--accent);font-size:14px">Monto factura: ${fmt(monto, moneda)}</div>`;
      html += `<div style="color:var(--yellow);font-size:14px">Descuento (${dtoPct}%): -${fmt(dtoMonto, moneda)}</div>`;
      html += `<div style="color:var(--green);font-size:15px;border-top:1px solid var(--border);padding-top:6px;margin-top:6px">Saldo a abonar: ${fmt(saldoFinal, moneda)}</div>`;
      if(moneda === 'USD' && tc > 0) {
        html += `<div style="color:var(--dim);font-size:12px;margin-top:4px">≈ Saldo en pesos: ${fmt(saldoFinal * tc, 'ARS')}</div>`;
        html += `<div style="color:var(--dim);font-size:12px">≈ NC en pesos: ${fmt(dtoMonto * tc, 'ARS')}</div>`;
      }
      saldoEl.innerHTML = html;
      res.style.display = '';
    } else {
      res.style.display = 'none';
    }
  }
}

window.aplicarDescuento = function(pct, montoFact, moneda, tc) {
  const checked = document.getElementById('aplicar_dto')?.checked;
  const info = document.getElementById('dto_pago_info');
  const montoInput = document.getElementById('p_monto');
  const dtoMonto = montoFact * pct / 100;
  const saldoConDto = montoFact - dtoMonto;
  if(checked) {
    if(montoInput) {
      montoInput.value = saldoConDto.toFixed(2);
      if(typeof calcPesosPago === 'function') calcPesosPago();
    }
    if(info) {
      info.style.display = '';
      let txtSaldo = fmt(saldoConDto, moneda);
      let txtNc = fmt(dtoMonto, moneda);
      if(moneda === 'USD' && tc > 0) {
        txtSaldo += ' (≈ ' + fmt(saldoConDto*tc, 'ARS') + ')';
        txtNc += ' (≈ ' + fmt(dtoMonto*tc, 'ARS') + ')';
      }
      document.getElementById('dto_pago_saldo').textContent = txtSaldo;
      document.getElementById('dto_pago_nc').textContent = txtNc;
    }
  } else {
    if(montoInput) {
      montoInput.value = montoFact.toFixed(2);
      if(typeof calcPesosPago === 'function') calcPesosPago();
    }
    if(info) info.style.display = 'none';
  }
};

function calcPesosPago() {
  const monto = parseFloat(document.getElementById('p_monto')?.value) || 0;
  const tc = parseFloat(document.getElementById('p_tc')?.value) || 0;
  const pesosEl = document.getElementById('p_pesos');
  if(pesosEl && tc > 0) pesosEl.value = (monto * tc).toFixed(2);
}

function checkDiff() {
  const ppto = state.presupuestos[state.editData?.presupuestoId];
  const montoEstaFactura = parseFloat(document.getElementById('f_monto')?.value)||0;
  // Sumar facturas ya cargadas del mismo presupuesto
  const facturasAnteriores = Object.values(state.facturas)
    .filter(f => f.presupuestoId === state.editData?.presupuestoId)
    .reduce((s, f) => s + (parseFloat(f.montoFacturado)||0), 0);
  const totalFacturado = facturasAnteriores + montoEstaFactura;
  const diff = totalFacturado - (parseFloat(ppto?.totalConIva)||0);
  const el = document.getElementById('diff-alert');
  if(!el) return;
  if(Math.abs(diff)>1) {
    const msg = facturasAnteriores > 0
      ? `⚠ Total facturado (${fmt(totalFacturado, ppto?.moneda||'ARS')}) vs presupuesto: diferencia de ${fmt(Math.abs(diff), ppto?.moneda||'ARS')} ${diff>0?'(facturas superan el ppto)':'(facturas menores al ppto)'}`
      : `⚠ Diferencia: ${fmt(Math.abs(diff), ppto?.moneda||'ARS')} ${diff>0?'(factura mayor al ppto)':'(factura menor al ppto)'}`;
    el.innerHTML = `<div class="alert-diff">${msg}</div>`;
  } else {
    el.innerHTML = '';
  }
}

// ─── IMPORTAR CSV DESDE APP DE REPUESTOS ──────────────────────────────────
window.importarCsvRepuestos = function(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const texto = e.target.result.replace(/^\uFEFF/, ''); // saca BOM
      const lineas = texto.split(/\r?\n/).filter(l => l.trim());
      if(lineas.length < 2) { toast('❌ El CSV está vacío'); return; }
      const headers = parseCsvLine(lineas[0]).map(h => h.trim());
      const idx = name => headers.indexOf(name);

      // Validar columnas obligatorias
      const requeridas = ['proveedor','fecha','descripcion','moneda','tipoIva','item_desc','cantidad','precio_unit'];
      const faltantes = requeridas.filter(c => idx(c) === -1);
      if(faltantes.length > 0) { toast('❌ Faltan columnas: ' + faltantes.join(', ')); return; }

      const filas = lineas.slice(1).map(l => parseCsvLine(l));

      // Agrupar por proveedor (normalizamos a MAYÚSCULAS para unificar)
      const grupos = {};
      for (const f of filas) {
        const provRaw = (f[idx('proveedor')] || '').trim();
        if (!provRaw) continue;
        const prov = provRaw.toUpperCase();
        if (!grupos[prov]) grupos[prov] = {
          proveedor: prov,
          fecha: f[idx('fecha')] || hoy(),
          descripcion: f[idx('descripcion')] || 'Importado de Repuestos',
          moneda: (f[idx('moneda')] || 'ARS').trim(),
          tipoIva: (f[idx('tipoIva')] || '21').trim(),
          items: []
        };
        grupos[prov].items.push({
          desc: f[idx('item_desc')] || '',
          cantidad: parseFloat(f[idx('cantidad')]) || 1,
          precioUnit: parseFloat(f[idx('precio_unit')]) || 0
        });
      }

      const cantProveedores = Object.keys(grupos).length;
      if(cantProveedores === 0) { toast('❌ No se encontraron proveedores en el CSV'); return; }

      if(!confirm('¿Importar ' + cantProveedores + ' presupuesto(s) desde el CSV?')) return;

      let creados = 0;
      for (const prov in grupos) {
        const g = grupos[prov];
        const ivaIncluido = g.tipoIva === 'incluido';
        const { neto, conIva } = calcTotales(g.items, ivaIncluido, g.tipoIva);
        await savePresupuesto({
          proveedor: g.proveedor,
          fecha: g.fecha,
          descripcion: g.descripcion,
          moneda: g.moneda,
          tipoIva: g.tipoIva,
          ivaIncluido,
          validezDias: 30,
          items: g.items,
          totalNeto: neto,
          totalConIva: conIva,
          estado: 'vigente',
          notas: 'Importado automáticamente desde la app de Repuestos'
        });
        creados++;
      }
      toast('✅ Importados ' + creados + ' presupuesto(s) desde Repuestos');
    } catch (err) {
      toast('❌ Error al leer el CSV');
      console.error(err);
    }
  };
  reader.readAsText(file);
};

// parser simple de una línea CSV que respeta comillas
function parseCsvLine(line){
  const out = []; let cur = ''; let q = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (q){
      if (ch === '"' && line[i+1] === '"'){ cur += '"'; i++; }
      else if (ch === '"'){ q = false; }
      else cur += ch;
    } else {
      if (ch === '"') q = true;
      else if (ch === ',') { out.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  out.push(cur);
  return out;
}
